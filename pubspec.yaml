name: ai_car_diagnostics
description: Specialized AI-powered Car Diagnostics application built with Flutter, Supabase, and Gemini.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  google_generative_ai: ^0.4.0
  flutter_dotenv: ^6.0.1
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  flutter_animate: ^4.5.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_blue_plus: ^2.3.8
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  google_mobile_ads: ^9.0.0
  flutter_markdown: ^0.7.7+1
  animated_text_kit: ^4.3.0
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  record: ^7.1.0
  audioplayers: ^6.1.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  shared_preferences: ^2.5.5
  geolocator: ^12.0.0
  geocoding: ^4.0.0
  google_mlkit_image_labeling: ^0.14.2
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1
  ar_flutter_plugin_2: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env


